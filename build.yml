name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile JSX → JS
        run: npm run build

      - name: Commit compiled app.js
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app.js
          git diff --cached --quiet || git commit -m "Auto-compile app.jsx → app.js"
          git push
