};

const BAND_MAP = [[0,5,"Band 2"],[6,9,"Band 3"],[10,13,"Band 4"],[14,17,"Band 5"],[18,20,"Band 6"]];
// Scale score to /20 equivalent before band lookup
const getBand = (score, maxScore=20) => {
  const scaled = maxScore > 0 ? Math.round((score / maxScore) * 20) : 0;
  return BAND_MAP.find(([lo,hi])=>scaled>=lo&&scaled<=hi)?.[2] || "Band 2";
};

// ─── MASTER AI PROMPT ────────────────────────────────────────────────────────
function buildSystemPrompt(syllabusJSON) {
  return `You are an expert NSW HSC Earth and Environmental Science teacher and examiner.
You apply the CUBE literacy strategy with PRECISE annotation rules, and mark student responses using a detailed rubric.

⚠️ GLOBAL RULE — ILLEGIBLE HANDWRITING:
When transcribing student handwriting in studentResponseText and formattedResponse:
- Every single word that you CANNOT read clearly MUST be written as [?]
- Do NOT leave blank spaces where a word should be
- Do NOT skip words
- [?] must appear in BOTH studentResponseText AND formattedResponse
- Example of correct transcription: "The [?] erupted causing [?] to spread into the [?]"
- Example of WRONG transcription: "The      erupted causing      to spread into the     " ← NEVER do this

SYLLABUS DATABASE:
${JSON.stringify(syllabusJSON, null, 2)}

DIRECTIVE VERBS AND RULES:
${JSON.stringify(DIRECTIVES, null, 2)}

CAUSAL CONNECTIVES:
${JSON.stringify(CONNECTIVES, null, 2)}

CONNECTIVE SCORING RULE:
- Preferred connectives (SO, BECAUSE, BUT) — award full credit
- Accepted alternatives (as a result, therefore, thus, hence, consequently, however, although, since, as, yet, etc.) — award FULL credit. These are equally valid HSC connectives. Only add a brief tip in the comment suggesting SO/BECAUSE/BUT as a stylistic alternative, not as a correction.
- When detecting connectives in the student response, recognise BOTH preferred and accepted forms
- In the specialCheck.explainCheck, hasSO/hasBECAUSE/hasBUT refers to preferred forms only; also report acceptedConnectivesFound separately

════════════════════════════════════════
CUBE ANNOTATION RULES — READ CAREFULLY
════════════════════════════════════════

C — CIRCLE (directive verbs)
- Detect ALL directive verbs in the question. Many questions have TWO (e.g. "Identify... and explain...").
- Circle ONLY the verb word(s) themselves — not surrounding words.
- Example: "Identify which gases impact" → circle only "Identify"
- Example: "Explain how the P and S waves can be used" → circle only "Explain"
- If there are two directives, return BOTH in the directives array.
- For each directive, record its exact startIndex in the question string.

U — UNDERLINE (syllabus keywords ONLY)
- Underline ONLY the specific noun keyword(s) from the matching syllabus dot point.
- Do NOT underline whole clauses, phrases, or sentences.
- Do NOT underline verbs, connectives, or generic words.
- Match against the syllabus database keywords list for the relevant dot point.
- Example: question mentions "gas(es)" and "climate" matching M7-1 or M6-2 → underline "gas(es)" and "climate" SEPARATELY as two underline annotations.
- Example: question mentions "supercontinent cycle" → underline only "supercontinent cycle"
- If there are multiple syllabus keywords in the question, return one underline annotation per keyword.

⚠️ ANNOTATION PRIORITY RULE — ONE ANNOTATION PER WORD:
Each word or phrase in the question can receive ONLY ONE annotation. Never annotate the same word twice.
Priority order (highest wins):
  1. C — CIRCLE: directive verbs always take priority
  2. U — UNDERLINE: syllabus keywords (if not already circled)
  3. B — BOX: constraints/scope words (if not already circled or underlined)
Example: "cooling" is both a syllabus keyword AND a causal direction word → UNDERLINE only (keyword wins over constraint).
Example: "Identify" is a directive AND could be a verb → CIRCLE only.
Do NOT add the same word to both syllabusKeywords and constraints arrays.

B — BOX (constraints — be generous, box anything that limits the scope)
- Box ALL of the following types of words/phrases:
  1. Evidence/method constraints: "using an example", "using a diagram", "using data", "with reference to", "using the stimulus"
  2. Scope constraints: number words ("two ways", "three reasons"), time periods, named locations
  3. Causal/directional constraint words: "impact", "effect", "change", "increase", "decrease", "cause", "result"  
     — these tell the student WHICH direction the answer must go, so they MUST be boxed
  4. Named organisms, processes, or events that constrain the topic: "P waves", "S waves", "cyanobacteria", "Veevers"
- Box the EXACT word or short phrase only — not the surrounding clause.
- NEVER box single prepositions or articles standing alone (to, on, the, a, an, of, in, at, by, for). These are not constraints.
- Example: "Identify which gas(es) impact on the climate to cool it. Draw a picture to explain?"
  → Box: "impact", "cool", "Draw a picture" (diagram required)
- NEVER leave causal/directional words unboxed.

E — EVIDENCE ARROWS (planning tab only)
- For each boxed constraint and each directive, generate a planning arrow.
- targetWord = the exact word from the question being annotated
- label = a SPECIFIC, CONTENT-RICH answer note — NOT a generic instruction.
  - For an IDENTIFY directive: write the ACTUAL scientific answer (e.g. "SO₂ / sulfur dioxide" not "name the gas")
  - For an EXPLAIN directive: write the ACTUAL causal mechanism in brief (e.g. "SO₂→aerosols→reflects sunlight" not "cause + SO/BECAUSE")
  - For a causal_directional constraint (e.g. "cool"): write WHAT causes that direction (e.g. "aerosols block solar radiation")
  - For a diagram constraint: write what the diagram must show (e.g. "volcano→stratosphere→aerosols→↓temp")
  - For scope/number constraints: write the specific content required
  - Labels may be up to 6 words — be specific and scientific, not procedural
- targetStartIndex = character position of that word in the question string

MULTI-DIRECTIVE QUESTIONS

If the question contains two directive verbs (e.g. "Identify X and explain Y"):
- Return ALL directives in the directives array (not just one).
- The primary directive is the one that determines rubric scoring and modality rules.
- The secondary directive adds an extra structure requirement to the response.

════════════════════════════════════════
RUBRIC SCORING (0–5 each)
════════════════════════════════════════

DIRECTIVE VERB TIERS — CRITICAL RULES:

TIER 1 — RECALL/LISTING (list, name, state, identify, define):
- NO causal connectives required — student is only naming/listing items
- causalConnectives: set applicable=false AND score=0 in the JSON — this displays as "Not applicable for this directive verb"
- modality: set applicable=false — also displays as "Not applicable"
- Total is therefore out of 10 (complexNounGroups + logicalFlow only)
- A response to "list" or "identify" that names correct items IS a full answer — no SO/BECAUSE needed
- specialCheck.type should be "none" for these directives

TIER 2 — DESCRIPTION (describe, outline, compare, construct):
- No causal connectives required — student is describing, not explaining
- causalConnectives: set applicable=false AND score=0 — "Not applicable for this directive verb"
- modality: set applicable=false
- Total is therefore out of 10 (complexNounGroups + logicalFlow only)

TIER 3 — REASONING (explain, analyse, predict, suggest, discuss):
- Causal connectives ARE required (SO, BECAUSE, BUT preferred)
- For EXPLAIN: specialCheck.type = "explain"
- Modality: ignore for explain/predict/suggest; optional for analyse/discuss

TIER 4 — EVALUATIVE (assess, evaluate, critically evaluate, justify):
- Causal connectives required AND judgement (IS/IS NOT) required
- specialCheck.type = "assess_eval"
- Modality: REQUIRED

Causal Connectives rubric scores: 0=none, 1=present but wrong, 2=one correct, 3=two correct, 4=three+, 5=four+ varied
Complex Noun Groups: 0=none, 1=minimal, 2=one clear, 3=two+, 4=several precise, 5=consistent technical
Modality: IGNORE if Tier 1/2 directive; optional for analyse; required for assess/evaluate
Logical Flow: 0=no structure, 1=disconnected, 2=basic, 3=mostly logical, 4=clear org, 5=highly coherent

SPECIAL DIRECTIVE RULES:
- EXPLAIN: response MUST use SO, BECAUSE, or BUT as causal connectives
- ASSESS/EVALUATE: response MUST include PRO argument, CON/opposing argument, AND IS/IS NOT judgement
- IDENTIFY + EXPLAIN (dual): response must first name/state the item, THEN explain with causal connectives

BAND MAPPING (only when marks not given): 0-5=Band2, 6-9=Band3, 10-13=Band4, 14-17=Band5, 18-20=Band6

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const toB64 = f => new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});

// ─── SVG ANNOTATED PAPER ─────────────────────────────────────────────────────
// Courier New at fontSize 17 — true measured char width is 10.2px not 10.5px.
// We also half-pixel-round every x calculation to prevent sub-pixel drift
// accumulating over longer lines (which was pushing shapes like "explain" off centre).
const FONT_SIZE = 17; // px — must match textLength calculation
const CW = 10.2;   // true char width px — Courier New fontSize 17
const LH = 38;     // line height px
const PL = 44;     // left pad
const PT = 58;     // top padding — increased to give ovals/boxes room above line 1
const CPL = 50;    // chars per line

function buildLines(text, cplOverride) {
  const CPL_USE = cplOverride || CPL;
  if (!text) return [];
  const lines = [];
  const words = text.split(/(\s+)/); // alternating words and spaces
  let lineText = "";
  let lineStart = 0;
  let charPos = 0;
  words.forEach(token => {
    if (!token) { charPos += token.length; return; }
    if (/^\s+$/.test(token)) {
      // space token
      if (lineText.length + token.length > CPL) {
        // flush line, skip the whitespace
        if (lineText) lines.push({ text: lineText, start: lineStart });
        lineStart = charPos + token.length;
        lineText = "";
      } else {
        lineText += token;
      }
    } else {
      // word token
      if (lineText.length + token.length > CPL_USE && lineText.trim()) {
        lines.push({ text: lineText, start: lineStart });
        lineStart = charPos;
        lineText = token;
      } else {
        if (!lineText) lineStart = charPos;
        lineText += token;
      }
    }
    charPos += token.length;
  });
  if (lineText.trim()) lines.push({ text: lineText, start: lineStart });
  return lines;
}

function getXY(idx, lines, yOff = 0) {
  if (!lines.length) return { x: PL, y: PT + yOff, li: 0 };
  for (let i = 0; i < lines.length; i++) {
    const end = lines[i].start + lines[i].text.length;
    if (idx < end || i === lines.length - 1) {
      const col = Math.max(0, idx - lines[i].start);
      // Round to nearest 0.5px to prevent sub-pixel drift on long lines
      return { x: PL + Math.round(col * CW * 2) / 2, y: PT + yOff + i * LH, li: i };
    }
  }
  return { x: PL, y: PT + yOff, li: 0 };
}

function SVGAnnotatedPaper({ text, directives, syllabusKeywords, constraints, planningArrows, mode,
                              // legacy fallback props
                              directive, syllabusMatch }) {
  if (!text) return null;

  // ── normalise to new schema, fall back to old single-object props ──
  const dirs = directives?.length ? directives
    : directive ? [directive] : [];
  const kwds = syllabusKeywords?.length ? syllabusKeywords
    : syllabusMatch ? [{ ...syllabusMatch, word: syllabusMatch.topicTitle }] : [];

  // Responsive CPL — fewer chars per line on narrow mobile screens
  const isMobile = typeof window !== "undefined" && window.innerWidth < 500;
  const effectiveCPL = isMobile ? 28 : CPL;
  const lines = buildLines(text, effectiveCPL);
  const nLines = Math.max(lines.length, 1);
  const W = PL + effectiveCPL * CW + PL;
  // PLAN_EXTRA: internal coordinate space above text; viewBox crops tight after pill layout
  const PLAN_EXTRA = mode === "plan" ? 200 : 0;
  const H = PT + PLAN_EXTRA + nLines * LH + 30;

  const shapes = [];

  // ── helper: find exact char position of a word near a given index ──────────
  // Searches ±25 chars around hintIdx to find where `word` actually appears.
  // Prefer forward (AI often points just before the word); fall back to backward.
  const findExact = (word, hintIdx) => {
    if (!word || hintIdx == null) return hintIdx;
    const wl = word.toLowerCase();
    const ql = text.toLowerCase();
    // Forward pass first (most common: AI points to word before)
    for (let d = 0; d <= 25; d++) {
      const i = hintIdx + d;
      if (ql.slice(i, i + wl.length) === wl) return i;
    }
    // Backward pass (less common: AI overshoots)
    for (let d = 1; d <= 10; d++) {
      const i = hintIdx - d;
      if (i >= 0 && ql.slice(i, i + wl.length) === wl) return i;
    }
    return hintIdx; // fallback: trust AI
  };

  // ── C: red ovals — one per directive verb ────────────────────────────────
  // s.y from getXY = SVG text baseline (y attr of <text> element)
  // Cap-height midpoint ≈ baseline - FONT_SIZE*0.36 ≈ baseline - 6px
  // ry should span from descender to ascender: ~FONT_SIZE*0.75
  dirs.forEach((dv, di) => {
    if (dv.startIndex == null || !dv.word) return;
    const exactStart = findExact(dv.word, dv.startIndex);
    const s = getXY(exactStart, lines, PLAN_EXTRA);
    const wPx = dv.word.length * CW;
    const rx = wPx/2 + 10;
    const ry = FONT_SIZE * 0.80;   // compact — spans the letter body
    const cy = s.y - FONT_SIZE * 0.36;  // centred on cap-height midpoint
    const cx = Math.max(s.x + wPx/2, PL - 8 + rx);
    shapes.push(
      <ellipse key={`circle${di}`}
        cx={cx} cy={cy} rx={rx} ry={ry}
        fill="rgba(192,57,43,0.08)" stroke="#c0392b" strokeWidth="2.5"/>
    );
  });

  // ── U: blue underlines — one per syllabus keyword ────────────────────────
  // s.y = baseline; underline sits just below baseline (+3px)
  kwds.forEach((kw, ki) => {
    if (kw.startIndex == null) return;
    const wordStr = kw.word || kw.topicTitle || "";
    const exactStart = findExact(wordStr, kw.startIndex);
    const exactEnd = exactStart + wordStr.length;
    const s = getXY(exactStart, lines, PLAN_EXTRA);
    const e = getXY(exactEnd,   lines, PLAN_EXTRA);
    for (let l = s.li; l <= e.li && l < lines.length; l++) {
      const x1 = l === s.li ? s.x : PL;
      const rawX2 = l === e.li ? e.x : PL + lines[l].text.trimEnd().length * CW;
      const x2 = rawX2 - 4;  // slight trim to avoid bleeding into next word
      const yBase = PT + PLAN_EXTRA + l * LH;  // baseline for this line
      const y = yBase + 4;   // just below baseline
      shapes.push(<line key={`u${ki}_${l}`} x1={x1} y1={y} x2={x2} y2={y} stroke="#1a6db5" strokeWidth="3" strokeLinecap="round"/>);
    }
  });

  // ── B: green boxes — constraints ─────────────────────────────────────────
  // s.y = baseline; box spans from ascender top to descender bottom
  const SKIP_WORDS = new Set(["to","on","the","a","an","of","in","at","by","for","it","is"]);
  // Build set of keyword text (lowercase) so we never box words already underlined
  const kwdTexts = new Set((syllabusKeywords||[]).map(k=>(k.word||"").trim().toLowerCase()));
  const dirTexts = new Set((directives||[]).map(d=>(d.word||"").trim().toLowerCase()));
  (constraints || []).forEach((ct, ci) => {
    if (ct.startIndex == null) return;
    const trimmed = (ct.text||"").trim();
    const tl = trimmed.toLowerCase();
    // Skip if this word is already a directive (circled) or syllabus keyword (underlined)
    if (SKIP_WORDS.has(tl) || kwdTexts.has(tl) || dirTexts.has(tl)) return;
    const exactStart = findExact(trimmed, ct.startIndex);
    const exactEnd   = exactStart + trimmed.length;
    const s = getXY(exactStart, lines, PLAN_EXTRA);
    const e = getXY(exactEnd,   lines, PLAN_EXTRA);
    const drawEnd = Math.min(e.li, s.li);
    for (let l = s.li; l <= drawEnd && l < lines.length; l++) {
      const x1 = (l === s.li ? s.x : PL) - 6;
      const x2 = (l === drawEnd ? e.x : PL + lines[l].text.trimEnd().length * CW) + 6;
      const yBase = PT + PLAN_EXTRA + l * LH;
      const boxTop = yBase - FONT_SIZE * 0.85;  // top of ascenders
      const boxH   = FONT_SIZE * 1.15;           // ascender to descender, stops above underline
      shapes.push(<rect key={`b${ci}_${l}`} x={x1} y={boxTop} width={Math.max(x2-x1, 12)} height={boxH} rx="4" fill="rgba(46,125,50,0.07)" stroke="#2e7d32" strokeWidth="2"/>);
    }
  });

  // ── E: Planning notes (plan mode only) ──────────────────────────────────────
  const notes = [];
  let allPills = [];

  if (mode === "plan" && Array.isArray(planningArrows) && planningArrows.length) {
    const FS = 10, CH = 6.0, LH_N = 13, PAD_X = 7, PAD_Y = 5;
    const MAX_CHARS = 14, BOX_GAP = 8, ROW_GAP = 4;

    const splitLabel = (label) => {
      if (label.length <= MAX_CHARS) return [label];
      const mid = Math.floor(label.length / 2);
      let split = -1;
      for (let d = 0; d <= 8; d++) {
        if (label[mid+d]==='→'||label[mid+d]===' '){split=mid+d+1;break;}
        if (label[mid-d]==='→'||label[mid-d]===' '){split=mid-d+1;break;}
      }
      if (split < 1) split = MAX_CHARS;
      return [label.slice(0,split).trim(), label.slice(split).trim()].filter(Boolean);
    };

    // Build pills — all above text, hard-clamped to SVG width
    allPills = planningArrows
      .filter(a => a.targetStartIndex != null && a.label)
      .map(a => {
        const idx = a.targetWord ? findExact(a.targetWord, a.targetStartIndex) : a.targetStartIndex;
        const pos = getXY(idx, lines, PLAN_EXTRA);
        const ls  = splitLabel(a.label);
        const bw  = Math.max(Math.max(...ls.map(l=>l.length)) * CH + PAD_X*2, 48);
        const bh  = ls.length * LH_N + PAD_Y * 2;
        const tx  = pos.x + (a.targetWord ? a.targetWord.length * CW / 2 : 6);
        const bx  = Math.min(Math.max(PL, tx - bw/2), W - bw - 2);
        return { ls, bw, bh, tx, bx, by:0, row:-1, tLine:pos.li, stemFromY:0, stemToY:0 };
      })
      .sort((a,b) => a.tx - b.tx);

    // Pack into rows (collision-aware, hard right boundary = W-2)
    const rowRight = [];
    allPills.forEach(p => {
      for (let r = 0; ; r++) {
        if (rowRight[r] == null) rowRight[r] = PL - BOX_GAP;
        if (p.bx >= rowRight[r] + BOX_GAP) {
          p.row = r; rowRight[r] = p.bx + p.bw; break;
        }
        const nudged = rowRight[r] + BOX_GAP;
        if (nudged + p.bw <= W - 2) {
          p.bx = nudged; p.row = r; rowRight[r] = p.bx + p.bw; break;
        }
        if (r >= 5) { p.row = r; break; }
      }
    });

    // Y: stack rows upward from just above first text line
    const maxBH    = Math.max(...allPills.map(p=>p.bh), 26);
    const textTopY = PT + PLAN_EXTRA - FONT_SIZE * 0.9 - 8;
    allPills.forEach(p => {
      p.by        = textTopY - (p.row + 1) * (maxBH + ROW_GAP);
      p.stemFromY = p.by + p.bh + 2;
      p.stemToY   = PT + PLAN_EXTRA + p.tLine * LH - FONT_SIZE * 0.9 - 4;
    });

    // Render
    allPills.forEach((p, i) => {
      const cx = p.bx + p.bw / 2;
      notes.push(
        <g key={`n${i}`}>
          <line x1={cx} y1={p.stemFromY} x2={p.tx} y2={p.stemToY-8}
            stroke="#c9a84c" strokeWidth="1.5" strokeDasharray="4,3"/>
          <polygon points={`${p.tx-5},${p.stemToY-8} ${p.tx+5},${p.stemToY-8} ${p.tx},${p.stemToY}`} fill="#c9a84c"/>
          <rect x={p.bx} y={p.by} width={p.bw} height={p.bh} rx="6" fill="#fff8e1" stroke="#c9a84c" strokeWidth="1.5"/>
          {p.ls.map((ln,li)=>(
            <text key={li} x={p.bx+PAD_X} y={p.by+PAD_Y+li*LH_N+FS}
              fontSize={FS} fontFamily="sans-serif" fontWeight="700" fill="#7a5000">{ln}</text>
          ))}
        </g>
      );
    });
  }

  // Tight viewBox: 4px above topmost pill, 4px below last text line
  const _textTop = PT + PLAN_EXTRA - FONT_SIZE;
  const _minY    = allPills.length ? Math.min(_textTop, ...allPills.map(p=>p.by)) : _textTop;
  const cropTop  = Math.max(0, _minY - 4);
  const svgH     = (PT + PLAN_EXTRA + nLines * LH + 16) - cropTop;

// ─── FORMATTED RESPONSE with bold connectives + italic noun groups ────────────
// Also detects runs of 3+ spaces left by AI for illegible words → converts to [?]
function normaliseIllegible(text) {
  if (!text) return text;
  // Replace 3+ consecutive spaces with [?] — AI commonly leaves gaps for illegible words
  return text.replace(/ {3,}/g, ' [?] ');
}

// Post-process formattedResponse: if AI forgot _italic_ markers for noun groups,
// wrap them based on detectedNounGroups list. Also ensure [?] from studentText carries through.
function enrichFormattedResponse(formatted, studentText, nounGroups, connectives) {
  // Pick best source
  const hasMarkup = t => t && (t.includes('**') || t.includes('_') || t.includes('[?]'));
  let text = hasMarkup(formatted) ? formatted
           : hasMarkup(studentText) ? studentText
           : formatted || studentText || '';
  // Normalise illegible gaps — 3+ spaces → [?]
  text = normaliseIllegible(text);

  // Always inject bold connectives client-side if not already present
  const allConnectives = [
    ...(connectives?.preferred || ["so","because","but"]),
    ...(connectives?.accepted  || ["therefore","thus","hence","however","although","consequently","as a result","which means","resulting in","leading to","due to","since","yet"])
  ];
  allConnectives.forEach(conn => {
    const escaped = conn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Only wrap if not already bolded
    text = text.replace(new RegExp(`(?<!\\*)(\\b${escaped}\\b)(?!\\*)`, 'gi'), '**$1**');
  });

  // Inject italic noun groups if missing
  if (nounGroups && nounGroups.length > 0 && !text.includes('_')) {
    // Sort longest first to avoid partial matches
    const sorted = [...nounGroups].sort((a,b) => b.length - a.length);
    sorted.forEach(ng => {
      if (!ng || ng.length < 2) return;
      const escaped = ng.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      text = text.replace(new RegExp(`(?<![_*])(${escaped})(?![_*])`, 'gi'), '_$1_');
    });
  }
  return text;
}
function FormattedResponse({ text }) {
  if (!text) return null;
  const cleaned = normaliseIllegible(text);
  const parts = [];
  const regex = /\*\*([^*]+)\*\*|_([^_]+)_|\[\?\]/g;
  let last = 0, m;
  while ((m = regex.exec(cleaned)) !== null) {
    if (m.index > last) parts.push(<span key={last}>{cleaned.slice(last, m.index)}</span>);
    if (m[0] === '[?]') {
      parts.push(<span key={m.index} style={{background:"#ff6d00",color:"white",borderRadius:"4px",padding:"1px 6px",fontWeight:900,fontFamily:"sans-serif",fontSize:"11px",margin:"0 2px",verticalAlign:"middle"}}>?</span>);
    } else if (m[1]) {
      // Bold connective — purple highlight, visible on cream paper
      parts.push(<strong key={m.index} style={{color:"#6a0dad",background:"rgba(106,13,173,0.12)",padding:"0 3px",borderRadius:"3px",fontFamily:"sans-serif"}}>{m[1]}</strong>);
    } else {
      // Italic noun group — dark teal, dotted underline, clearly visible on cream
      parts.push(<em key={m.index} style={{color:"#1a5276",textDecoration:"underline",textDecorationStyle:"dotted",textDecorationColor:"#1a5276",fontStyle:"italic"}}>{m[2]}</em>);
    }
    last = m.index + m[0].length;
  }
  if (last < cleaned.length) parts.push(<span key="end">{cleaned.slice(last)}</span>);
  return <>{parts}</>;
}

// ─── STEP INDICATOR ──────────────────────────────────────────────────────────
function Steps({current, activeTab}) {
  const steps = ["Upload","CUBE","Plan","Analyse","Feedback"];
  // Map tab name → step index so the active circle tracks the current tab
  const tabToStep = {cube:1, plan:2, script:3, rubric:3, feedback:4};

  return <div style={{display:"flex",alignItems:"center",gap:"0",marginBottom:"28px"}}>
    {steps.map((s,i)=>{
      const done = i < highlight;
      const active = i === highlight;
      return <div key={s} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:"auto"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>

            fontSize:"18px",fontWeight:900,

            {done && !active ? "✓" : i+1}

          <div style={{fontSize:"15px",

        </div>

                <input value={!questionsOnPage.map(String).includes(questionNumber)&&questionNumber?questionNumber:""} onChange={e=>setQuestionNumber(e.target.value)} placeholder="Other" style={{width:"72px",height:"52px",borderRadius:"10px",border:`2px solid ${!questionsOnPage.map(String).includes(questionNumber)&&questionNumber?gold:"rgba(255,255,255,0.12)"}`,background:"rgba(255,255,255,0.04)",color:"#e8eaf0",fontSize:"15px",fontWeight:700,textAlign:"center",fontFamily:"sans-serif",outline:"none"}}/>
              </div>}
            </div>}

            {error&&<div style={{background:"rgba(244,67,54,0.1)",border:"1px solid rgba(244,67,54,0.4)",borderRadius:"10px",padding:"12px 16px",color:"#ff8a80",marginBottom:"16px",fontSize:"14px",fontFamily:"sans-serif"}}>{error}</div>}

            {pageImg&&(
              questionsOnPage === null
                ? <div style={{width:"100%",padding:"18px",background:"#1a2a3a",borderRadius:"14px",fontSize:"17px",fontWeight:900,letterSpacing:"1px",fontFamily:"'Courier New',monospace",color:"#5a7a9a",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",boxSizing:"border-box"}}>
                    <span className="cube-spinner-dim"></span>
                    Reading your image for available questions...
                  </div>
                : <button onClick={analyse} disabled={loading} style={{width:"100%",padding:"18px",background:loading?"#1a2a3a":`linear-gradient(90deg,${gold},#e8c96a)`,color:loading?"#5a7a9a":"#040d18",border:"none",borderRadius:"14px",fontSize:"17px",fontWeight:900,cursor:loading?"not-allowed":"pointer",letterSpacing:"1px",fontFamily:"sans-serif",transition:"all 0.2s"}}>
                    {loading
                      ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}><span className="cube-spinner-dim"></span>{loadingMsg}</span>
                      : "🔍  SELECT A QUESTION ABOVE  —  THEN CLICK TO ANALYSE"}
                  </button>
            )}
          </div>
        )}

        {/* ── PHASE 2: RESULTS ── */}
        {phase===2&&results&&(()=>{
          const { phase1_cube: c, phase2_plan: p, phase3_analysis: a } = results;
          // ── normalise: support both new array schema and old single-object schema ──
          const dirs = c.directives?.length ? c.directives : c.directive ? [c.directive] : [];
          const kwds = c.syllabusKeywords?.length ? c.syllabusKeywords : c.syllabusMatch ? [c.syllabusMatch] : [];
          const primaryDir = dirs.find(d=>d.isPrimary) || dirs[0] || {};
          const primaryKwd = kwds[0] || {};
          const verbType = primaryDir.verbType || "other";
          const isExplain = verbType==="explain" || dirs.some(d=>d.verbType==="explain");
          const isAssessEval = ["assess","evaluate","critically evaluate"].includes(verbType);
          const score = totalScore(a);
          const marksKnown = c.marks !== null && c.marks !== undefined;
          const causalApplicable  = a.rubric?.causalConnectives?.applicable !== false;
          const modalityApplicable = a.rubric?.modality?.applicable === true;
          const maxScore = 10 + (causalApplicable ? 5 : 0) + (modalityApplicable ? 5 : 0);
          const band = marksKnown ? null : getBand(score, maxScore);

          return <div>
            <Steps current={4} activeTab={activeTab}/>

            {/* ── Question summary bar ── */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"14px 18px",marginBottom:"20px",border:"1px solid rgba(201,168,76,0.2)"}}>
              <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center",marginBottom:"10px"}}>
                {dirs.map((dv,i)=>(
                  <div key={i} style={{display:"inline-block",border:"2.5px solid #c0392b",borderRadius:"50%",padding:"2px 10px",color:"#c0392b",fontWeight:900,fontSize:"13px"}}>{dv.word}</div>
                ))}
                <div style={{color:"#e8eaf0",fontSize:"13px",fontFamily:"sans-serif",whiteSpace:"nowrap"}}>Mod {primaryKwd.module}</div>
                {questionNumber&&<div style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"20px",padding:"3px 12px",color:"#c8d8e8",fontSize:"12px",fontWeight:700,fontFamily:"sans-serif"}}>Q{questionNumber}</div>}
                {c.marks&&<div style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:"20px",padding:"3px 12px",color:gold,fontSize:"12px",fontWeight:700,fontFamily:"sans-serif"}}>{c.marks} marks</div>}
                {!marksKnown&&band&&<div style={{background:"rgba(76,175,80,0.15)",border:"1px solid rgba(76,175,80,0.4)",borderRadius:"20px",padding:"3px 12px",color:"#81c784",fontSize:"13px",fontWeight:800,fontFamily:"sans-serif"}}>{band}</div>}
              </div>
              {c.questionText&&<div style={{color:"#ffffff",fontSize:"14px",fontFamily:"'Courier New',monospace",lineHeight:"1.6"}}>{c.questionText}</div>}
            </div>

            {/* ── TABS: numbered circles ── */}
            <div style={{display:"flex",justifyContent:"space-around",alignItems:"flex-start",background:"rgba(255,255,255,0.04)",borderRadius:"16px",padding:"10px 4px",marginBottom:"20px",border:"1px solid rgba(255,255,255,0.08)"}}>
              {[["cube","CUBE"],["plan","Plan"],["script","Script"],["rubric","Rubric"],["feedback","Feedback"]].map(([id,label],idx)=>{
                const active = activeTab===id;
                return <div key={id} onClick={()=>setActiveTab(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",cursor:"pointer",minWidth:"52px"}}>
                  <div style={{width:"48px",height:"48px",borderRadius:"50%",background:active?gold:"rgba(255,255,255,0.08)",border:active?"none":"2px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"18px",color:active?"#0d1b2a":"#7a9ab8",boxShadow:active?"0 4px 14px rgba(201,168,76,0.5)":"none",transition:"all 0.2s"}}>{idx+1}</div>
                  <span style={{fontSize:"12px",fontWeight:active?800:500,color:active?gold:"#7a9ab8",fontFamily:"sans-serif",textAlign:"center",lineHeight:1.2}}>{label}</span>
                </div>;
              })}
            </div>

            {/* ═══ TAB: CUBE ═══ */}
            {activeTab==="cube"&&<div>
              <SectionTitle>STEP 1 — CUBE ANALYSIS</SectionTitle>

              <SVGAnnotatedPaper
                text={c.questionText}
                directives={dirs}
                syllabusKeywords={kwds}
                constraints={c.constraints}
                mode="cube"
              />

              {/* Legend */}
              <div style={{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"16px",padding:"10px 14px",background:"rgba(255,255,255,0.04)",borderRadius:"10px",border:"1px solid rgba(255,255,255,0.08)"}}>
                {[
                  {color:"#c0392b", ch:"C", desc:"Directive verb(s)"},
                  {color:"#1a6db5", ch:"U", desc:"Syllabus keyword(s)"},
                  {color:"#2e7d32", ch:"B", desc:"Constraints / scope words"},
                ].map(k=>(
                  <div key={k.ch} style={{display:"flex",alignItems:"center",gap:"7px",fontSize:"13px",color:"#e8eaf0",fontFamily:"sans-serif"}}>
                    <strong style={{color:k.color}}>{k.ch}</strong> = {k.desc}
                  </div>
                ))}
              </div>

              {/* C cards — one per directive */}
              {dirs.map((dv,i)=>(
                <Card key={i} bg="rgba(192,57,43,0.08)" border="rgba(192,57,43,0.3)">
                  <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                    <div style={{background:"#c0392b",color:"white",borderRadius:"50%",width:"28px",height:"28px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"14px",flexShrink:0}}>C</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:"#ff8a80",fontSize:"15px",marginBottom:"3px"}}>
                        Directive Verb: <span style={{background:"rgba(192,57,43,0.2)",padding:"1px 8px",borderRadius:"20px"}}>{dv.word}</span>
                        {dirs.length>1&&<span style={{marginLeft:"8px",fontSize:"11px",color:"#ffab91",fontFamily:"sans-serif"}}>{dv.isPrimary?"PRIMARY":"SECONDARY"}</span>}
                      </div>
                      <div style={{color:"#e8d0d0",fontSize:"14px",lineHeight:"1.5"}}>{dv.meaning}</div>
                      {dv.verbType==="explain"&&<div style={{marginTop:"8px",display:"flex",gap:"8px"}}>
                        {["SO","BECAUSE","BUT"].map(w=><span key={w} style={{background:"rgba(123,31,162,0.3)",border:"1px solid rgba(206,147,216,0.5)",borderRadius:"5px",padding:"2px 10px",fontWeight:900,color:"#ce93d8",fontSize:"15px",fontFamily:"sans-serif"}}>{w}</span>)}
                      </div>}
                      {["assess","evaluate","critically evaluate"].includes(dv.verbType)&&<div style={{marginTop:"8px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
                        {["✅ PRO","❌ CON","⚖️ IS/IS NOT"].map(w=><span key={w} style={{background:"rgba(230,81,0,0.2)",border:"1px solid rgba(255,171,145,0.4)",borderRadius:"5px",padding:"2px 10px",fontWeight:700,color:"#ffab91",fontSize:"15px",fontFamily:"sans-serif"}}>{w}</span>)}
                      </div>}
                    </div>
                  </div>
                </Card>
              ))}

              {/* U cards — one per syllabus keyword */}
              {kwds.map((kw,i)=>(
                <Card key={i} bg="rgba(21,101,192,0.08)" border="rgba(21,101,192,0.3)">

                    <div style={{background:"#1565c0",color:"white",borderRadius:"50%",width:"28px",height:"28px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"14px",flexShrink:0}}>U</div>
                    <div>
                      <div style={{fontWeight:700,color:"#ffffff",fontSize:"15px",marginBottom:"3px"}}>

                      </div>
                      <div style={{color:"#e8eaf0",fontSize:"13px",marginBottom:"4px",fontFamily:"sans-serif"}}>Module {kw.module}: {kw.moduleTitle} · {kw.topicCode}</div>
                      <div style={{color:"#e8eaf0",fontSize:"13px",lineHeight:"1.5"}}>{kw.syllabusText}</div>
                    </div>
                  </div>
                </Card>
              ))}

              {/* B card */}
              {c.constraints?.length>0&&<Card bg="rgba(46,125,50,0.08)" border="rgba(46,125,50,0.3)">
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  <div style={{background:"#2e7d32",color:"white",borderRadius:"50%",width:"28px",height:"28px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"14px",flexShrink:0}}>B</div>
                  <div style={{width:"100%"}}>
                    <div style={{fontWeight:700,color:"#a5d6a7",fontSize:"15px",marginBottom:"8px"}}>Constraints &amp; Scope Words:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                      {c.constraints.map((ct,i)=><div key={i} style={{background:"rgba(46,125,50,0.12)",border:"2px solid #2e7d32",borderRadius:"6px",padding:"4px 12px"}}>
                        <div style={{color:"#a5d6a7",fontWeight:700,fontSize:"14px"}}>{ct.text}</div>
                        <div style={{color:"#81c784",fontSize:"11px",fontFamily:"sans-serif"}}>{ct.type?.replace(/_/g," ")}</div>
                      </div>)}
                    </div>
                    {c.evidenceRequired&&<div style={{marginTop:"10px",background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"6px",padding:"6px 12px",fontSize:"14px",color:gold,fontFamily:"sans-serif"}}>⚠️ Evidence required: {c.evidenceType}</div>}
                  </div>
                </div>
              </Card>}
            </div>}

            {/* ═══ TAB: PLAN ═══ */}
            {activeTab==="plan"&&<div>
              <SectionTitle>STEP 2 — ANSWER PLANNING</SectionTitle>

              <div style={{fontSize:"14px",color:"#e8eaf0",fontFamily:"sans-serif",marginBottom:"12px",lineHeight:"1.6"}}>
                Planning notes are written above each key word — just like annotating your question before you write.
              </div>

              {/* SVG plan paper with notes above words */}
              <SVGAnnotatedPaper
                text={c.questionText}
                directives={dirs}
                syllabusKeywords={kwds}
                constraints={c.constraints}
                planningArrows={p.planningArrows}
                mode="plan"
              />

              {/* Answer summary */}
              {p.summary&&<Card bg="rgba(201,168,76,0.08)" border="rgba(201,168,76,0.3)">
                <div style={{fontSize:"15px",color:"#f0e6c8",lineHeight:"1.6"}}>
                  <strong style={{color:gold}}>In short: </strong>{p.summary}
                </div>
              </Card>}

              {/* Writing scaffold */}
              {p.writingScaffold&&<Card bg="rgba(33,150,243,0.06)" border="rgba(33,150,243,0.25)">
                <SectionTitle color="#ffffff">WRITING SCAFFOLD</SectionTitle>
                {["step1","step2","step3","step4"].filter(k=>p.writingScaffold[k]).map((k,i)=>(
                  <div key={k} style={{display:"flex",gap:"12px",marginBottom:"12px",alignItems:"flex-start"}}>
                    <div style={{background:"#1565c0",color:"white",borderRadius:"50%",width:"26px",height:"26px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"13px",flexShrink:0,marginTop:"2px",fontFamily:"sans-serif"}}>{i+1}</div>
                    <div style={{color:"#e8eaf0",fontSize:"15px",lineHeight:"1.6"}}>{p.writingScaffold[k]}</div>
                  </div>
                ))}
              </Card>}
            </div>}

            {/* ═══ TAB: SCRIPT ═══ */}
            {activeTab==="script"&&<div>
              <SectionTitle>STEP 3 — YOUR RESPONSE (FORMATTED)</SectionTitle>
              <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"6px 12px",marginBottom:"12px",border:"1px solid rgba(255,255,255,0.08)",display:"flex",gap:"16px",flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:"13px",color:"#e8eaf0",fontFamily:"sans-serif"}}><strong style={{color:"#6a0dad",background:"rgba(106,13,173,0.12)",padding:"0 4px",borderRadius:"3px",fontFamily:"sans-serif"}}>bold</strong> = causal connective</span>
                <span style={{fontSize:"13px",color:"#e8eaf0",fontFamily:"sans-serif"}}><em style={{color:"#1a5276",textDecoration:"underline",textDecorationStyle:"dotted"}}>italic underline</em> = complex noun group</span>
                <span style={{fontSize:"13px",fontFamily:"sans-serif",color:"#e8eaf0"}}><span style={{background:"#ff6d00",color:"white",borderRadius:"4px",padding:"1px 6px",fontWeight:900,fontSize:"11px"}}>?</span> = illegible word — check your photo</span>
              </div>
              <PaperCard subtitle="STUDENT RESPONSE — VERBATIM">
                <div style={{fontSize:"16px",lineHeight:"1.9",color:"#1a1a2e",fontFamily:"'Georgia',serif"}}>
                  <FormattedResponse text={enrichFormattedResponse(a.formattedResponse, a.studentResponseText, a.detectedNounGroups, CONNECTIVES)}/>
                </div>
              </PaperCard>

              {/* Show original photo if illegible words detected */}
              {(()=>{const t=enrichFormattedResponse(a.formattedResponse, a.studentResponseText, a.detectedNounGroups, CONNECTIVES)||""; return (normaliseIllegible(t).includes("[?]"))&&pageImg;})()&&<div style={{marginBottom:"14px"}}>
                <div style={{fontSize:"11px",color:"#ff9800",fontWeight:800,letterSpacing:"1px",marginBottom:"8px",fontFamily:"sans-serif"}}>📷 YOUR ORIGINAL PHOTO — Check the <span style={{background:"#ff6d00",color:"white",borderRadius:"3px",padding:"0 5px"}}>?</span> words against your handwriting</div>
                <img src={`data:image/jpeg;base64,${pageB64}`} style={{maxWidth:"100%",borderRadius:"10px",border:"2px solid rgba(255,152,0,0.4)",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}} alt="Your worksheet"/>
              </div>}

              {/* Response structure check */}
              <Card bg="rgba(255,255,255,0.04)" border="rgba(255,255,255,0.1)">
                <SectionTitle>RESPONSE STRUCTURE CHECK</SectionTitle>
                <div style={{fontSize:"15px",color:"#e8eaf0",fontFamily:"sans-serif",marginBottom:"10px",lineHeight:"1.5"}}>{a.responseStructure?.structureComment}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                  {isExplain&&[
                    [a.responseStructure?.hasCause,"Cause identified"],
                    [a.responseStructure?.hasCausalConnective,"Causal connective used"],
                    [a.responseStructure?.hasEffect,"Effect explained"],
                  ].map(([ok,label],i)=><div key={i} style={{display:"flex",gap:"8px",alignItems:"center",fontSize:"13px",fontFamily:"sans-serif"}}><Tick ok={ok}/><span style={{color:"#c8d8e8"}}>{label}</span></div>)}
                  {isAssessEval&&[
                    [a.responseStructure?.hasArgument1,"First argument (PRO)"],
                    [a.responseStructure?.hasArgument2OrCounterpoint,"Second argument (CON)"],
                    [a.responseStructure?.hasFinalJudgement,"IS / IS NOT judgement"],
                  ].map(([ok,label],i)=><div key={i} style={{display:"flex",gap:"8px",alignItems:"center",fontSize:"13px",fontFamily:"sans-serif"}}><Tick ok={ok}/><span style={{color:"#c8d8e8"}}>{label}</span></div>)}
                </div>
              </Card>
            </div>}

            {/* ═══ TAB: RUBRIC ═══ */}
            {activeTab==="rubric"&&<div>
              <SectionTitle>STEP 4 — RUBRIC TABLE</SectionTitle>

              <Card bg="rgba(255,255,255,0.03)" border="rgba(255,255,255,0.08)" style={{padding:0,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:"rgba(201,168,76,0.12)"}}>
                      <th style={{padding:"12px 14px",textAlign:"left",color:gold,fontSize:"12px",fontFamily:"sans-serif",fontWeight:800,letterSpacing:"1px"}}>CRITERION</th>
                      <th style={{padding:"12px 14px",textAlign:"center",color:gold,fontSize:"12px",fontFamily:"sans-serif",fontWeight:800,letterSpacing:"1px",width:"64px"}}>SCORE</th>
                      <th style={{padding:"12px 14px",textAlign:"left",color:gold,fontSize:"12px",fontFamily:"sans-serif",fontWeight:800,letterSpacing:"1px"}}>EVIDENCE &amp; COMMENT</th>
                    </tr>
                  </thead>
                  <tbody>
                    <RubricRow label="Causal Connectives" data={a.rubric?.causalConnectives} applicable={a.rubric?.causalConnectives?.applicable !== false}/>
                    <RubricRow label="Complex Noun Groups" data={a.rubric?.complexNounGroups}/>
                    <RubricRow label="Modality" data={a.rubric?.modality} applicable={a.rubric?.modality?.applicable}/>
                    <RubricRow label="Logical Flow &amp; Cohesion" data={a.rubric?.logicalFlow}/>
                    <tr style={{background:"rgba(201,168,76,0.08)"}}>
                      <td style={{padding:"12px 14px",fontWeight:800,color:gold,fontSize:"13px",fontFamily:"sans-serif"}}>TOTAL</td>
                      <td style={{padding:"12px 14px",textAlign:"center"}}>
                        <span style={{fontWeight:900,fontSize:"16px",color:gold}}>{score}</span>
                        <span style={{color:"#e8eaf0",fontSize:"15px",fontFamily:"sans-serif"}}>/{maxScore}</span>
                      </td>
                      <td style={{padding:"12px 14px",color:"#e8eaf0",fontSize:"13px",fontFamily:"sans-serif"}}>
                        {!marksKnown&&band&&<span style={{background:"rgba(76,175,80,0.15)",border:"1px solid rgba(76,175,80,0.4)",borderRadius:"20px",padding:"3px 12px",color:"#81c784",fontWeight:800}}>Indicative {band}</span>}
                        {marksKnown&&<span style={{color:"#e8eaf0",fontSize:"12px"}}>Mark value provided — band not calculated</span>}
                      </td>
                    </tr>
                  </tbody>
                </table>
              </Card>

              {/* Detected features */}
              <div style={{display:"grid",gridTemplateColumns:`${causalApplicable?"1fr ":""}1fr`,gap:"12px",marginTop:"4px"}}>
                {causalApplicable&&<Card bg="rgba(123,31,162,0.08)" border="rgba(123,31,162,0.3)">
                  <SectionTitle color="#ce93d8">CONNECTIVES FOUND</SectionTitle>
                  {a.detectedConnectives?.length>0 ? <>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>
                      {a.detectedConnectives.map((c,i)=>{
                        const isPref = CONNECTIVES.preferred.includes(c.toLowerCase());
                        return <span key={i} style={{display:"inline-block",
                          background:isPref?"rgba(123,31,162,0.3)":"rgba(46,125,50,0.2)",
                          border:`1px solid ${isPref?"rgba(206,147,216,0.5)":"rgba(129,199,132,0.5)"}`,
                          borderRadius:"5px",padding:"3px 10px",
                          fontSize:"13px",fontWeight:700,
                          color:isPref?"#ce93d8":"#81c784",fontFamily:"sans-serif"}}>{c}</span>;
                      })}
                    </div>
                    <div style={{fontSize:"11px",color:"#888",fontFamily:"sans-serif"}}>
                      <span style={{color:"#ce93d8"}}>■</span> SO/BECAUSE/BUT &nbsp;
                      <span style={{color:"#81c784"}}>■</span> accepted alternative — both valid ✓
                    </div>
                  </> : <div style={{color:"#e8eaf0",fontSize:"13px",fontFamily:"sans-serif",fontStyle:"italic"}}>None detected</div>}
                </Card>}
                <Card bg="rgba(21,101,192,0.08)" border="rgba(21,101,192,0.3)">
                  <SectionTitle color="#64b5f6">NOUN GROUPS FOUND</SectionTitle>
                  {a.detectedNounGroups?.length>0 ? a.detectedNounGroups.map((ng,i)=><div key={i} style={{fontSize:"15px",color:"#e8eaf0",fontStyle:"italic",marginBottom:"3px"}}>"{ng}"</div>)
                  :<div style={{color:"#e8eaf0",fontSize:"13px",fontFamily:"sans-serif",fontStyle:"italic"}}>None detected</div>}
                </Card>
              </div>
            </div>}

            {/* ═══ TAB: FEEDBACK ═══ */}
            {activeTab==="feedback"&&<div>
              <SectionTitle>STEPS 5–8 — MEDALS, MISSION &amp; FEEDBACK</SectionTitle>

              {/* ── 1. MEDALS first — celebrate what they did well ── */}
              {a.medals?.medal1&&<Card bg="rgba(255,215,0,0.06)" border="rgba(255,215,0,0.3)">
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  <div style={{fontSize:"32px"}}>🥇</div>
                  <div>
                    <div style={{fontWeight:800,color:"#ffd700",fontSize:"15px",marginBottom:"4px",fontFamily:"sans-serif"}}>Medal 1 — {a.medals.medal1.category}</div>
                    <div style={{color:"#f0e6c8",fontSize:"14px",lineHeight:"1.6",marginBottom:"8px"}}>{a.medals.medal1.explanation}</div>
                    <div style={{background:"rgba(255,215,0,0.08)",border:"1px solid rgba(255,215,0,0.25)",borderRadius:"8px",padding:"8px 12px",color:"#f5d67a",fontSize:"13px",fontStyle:"italic"}}>"{a.medals.medal1.quote}"</div>
                  </div>
                </div>
              </Card>}

              {a.medals?.medal2&&<Card bg="rgba(192,192,192,0.06)" border="rgba(192,192,192,0.25)">
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  <div style={{fontSize:"32px"}}>🥈</div>
                  <div>
                    <div style={{fontWeight:800,color:"#c0c0c0",fontSize:"15px",marginBottom:"4px",fontFamily:"sans-serif"}}>Medal 2 — {a.medals.medal2.category}</div>
                    <div style={{color:"#e0e0e0",fontSize:"14px",lineHeight:"1.6",marginBottom:"8px"}}>{a.medals.medal2.explanation}</div>
                    <div style={{background:"rgba(192,192,192,0.08)",border:"1px solid rgba(192,192,192,0.2)",borderRadius:"8px",padding:"8px 12px",color:"#d0d0d0",fontSize:"13px",fontStyle:"italic"}}>"{a.medals.medal2.quote}"</div>
                  </div>
                </div>
              </Card>}

              {/* ── 2. Mission — immediately after medals ── */}
              {a.mission&&<Card bg="rgba(244,67,54,0.06)" border="rgba(244,67,54,0.3)">
                <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                  <div style={{fontSize:"32px"}}>🎯</div>
                  <div style={{width:"100%"}}>
                    <div style={{fontWeight:800,color:"#ff8a80",fontSize:"15px",marginBottom:"4px",fontFamily:"sans-serif"}}>Your Mission — {a.mission.targetCategory}</div>
                    <div style={{color:"#ffcdd2",fontSize:"14px",lineHeight:"1.6",marginBottom:"10px"}}>{a.mission.weakness}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                      <div style={{background:"rgba(244,67,54,0.1)",borderRadius:"8px",padding:"10px 12px",border:"1px solid rgba(244,67,54,0.25)"}}>
                        <div style={{fontSize:"10px",color:"#ff8a80",fontWeight:700,letterSpacing:"1px",marginBottom:"6px",fontFamily:"sans-serif"}}>ORIGINAL</div>
                        <div style={{fontSize:"13px",color:"#ffcdd2",fontStyle:"italic"}}>"{a.mission.originalPhrase}"</div>
                      </div>
                      <div style={{background:"rgba(76,175,80,0.08)",borderRadius:"8px",padding:"10px 12px",border:"1px solid rgba(76,175,80,0.25)"}}>
                        <div style={{fontSize:"10px",color:"#81c784",fontWeight:700,letterSpacing:"1px",marginBottom:"6px",fontFamily:"sans-serif"}}>IMPROVED</div>
                        <div style={{fontSize:"13px",color:"#c8e6c9",fontStyle:"italic"}}>"{a.mission.improvedVersion}"</div>
                      </div>
                    </div>
                  </div>
                </div>
              </Card>}

              {/* ── 3. Special check (connectives / argument structure) ── */}
              {a.specialCheck?.type!=="none"&&<Card bg={isExplain?"rgba(123,31,162,0.1)":"rgba(230,81,0,0.1)"} border={isExplain?"rgba(123,31,162,0.35)":"rgba(230,81,0,0.35)"}>
                <SectionTitle color={isExplain?"#ce93d8":"#ffab91"}>{isExplain?"⚠️ EXPLAIN — CAUSAL CONNECTIVES":"⚠️ ASSESS/EVALUATE — ARGUMENT STRUCTURE"}</SectionTitle>
                {isExplain&&a.specialCheck?.explainCheck&&(()=>{
                  const ec = a.specialCheck.explainCheck;
                  const hasPreferred = ec.hasSO || ec.hasBECAUSE || ec.hasBUT;
                  const hasAccepted  = ec.acceptedConnectivesFound?.length > 0;
                  const hasAny = hasPreferred || hasAccepted;
                  // Collect all connectives found (preferred + accepted) for display
                  const allFound = [
                    ...(ec.hasSO?["so"]:[]),
                    ...(ec.hasBECAUSE?["because"]:[]),
                    ...(ec.hasBUT?["but"]:[]),
                    ...(ec.acceptedConnectivesFound||[])
                  ];
                  return <>
                    {/* Cause-effect link check — always shown */}
                    <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"10px",fontSize:"13px",fontFamily:"sans-serif"}}>
                      <Tick ok={ec.causeEffectLinked}/><span style={{color:"#e8eaf0"}}>Cause linked to effect</span>
                    </div>

                    {/* If any connectives found — show them positively */}
                    {hasAny && <div style={{background:"rgba(76,175,80,0.1)",border:"1px solid rgba(76,175,80,0.35)",borderRadius:"8px",padding:"10px 14px",marginBottom:"8px"}}>
                      <div style={{fontSize:"11px",color:"#81c784",fontWeight:800,letterSpacing:"1px",marginBottom:"8px",fontFamily:"sans-serif"}}>✅ CAUSAL CONNECTIVES USED</div>
                      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"8px"}}>
                        {allFound.map((c,i)=>{
                          const isPref = CONNECTIVES.preferred.includes(c.toLowerCase());
                          return <span key={i} style={{
                            background: isPref?"rgba(123,31,162,0.25)":"rgba(201,168,76,0.2)",
                            border:`1px solid ${isPref?"rgba(206,147,216,0.5)":"rgba(201,168,76,0.4)"}`,
                            borderRadius:"5px",padding:"3px 10px",fontSize:"13px",fontWeight:700,
                            color:isPref?"#ce93d8":"#f0d080",fontFamily:"sans-serif"
                          }}>{c}</span>;
                        })}
                      </div>
                      {/* Tip: only show SO/BECAUSE/BUT nudge if they haven't already used them */}
                      {!hasPreferred && <div style={{fontSize:"12px",color:"#c9a84c",fontFamily:"sans-serif",fontStyle:"italic"}}>
                        Good use of causal connectives — also try SO / BECAUSE / BUT for maximum HSC impact.
                      </div>}
                    </div>}

                    {/* If NO connectives at all */}
                    {!hasAny && <div style={{background:"rgba(244,67,54,0.08)",border:"1px solid rgba(244,67,54,0.3)",borderRadius:"8px",padding:"10px 14px",marginBottom:"8px"}}>
                      <div style={{fontSize:"13px",color:"#ff8a80",fontFamily:"sans-serif",fontWeight:600}}>❌ No causal connectives found</div>
                      <div style={{fontSize:"12px",color:"#e8eaf0",fontFamily:"sans-serif",marginTop:"4px"}}>Try using: <strong style={{color:"#ce93d8"}}>SO</strong>, <strong style={{color:"#ce93d8"}}>BECAUSE</strong>, <strong style={{color:"#ce93d8"}}>BUT</strong> — or alternatives like <em>therefore, thus, however, since, as a result</em></div>
                    </div>}

                    <div style={{marginTop:"6px",color:"#d1c4e9",fontSize:"13px",fontFamily:"sans-serif",lineHeight:"1.6"}}>{ec.comment}</div>
                  </>;
                })()}
                {isAssessEval&&a.specialCheck?.assessEvalCheck&&<>
                  {[
                    [a.specialCheck.assessEvalCheck.hasPRO,"PRO / advantage",a.specialCheck.assessEvalCheck.proText],
                    [a.specialCheck.assessEvalCheck.hasCON,"CON / opposing argument",a.specialCheck.assessEvalCheck.conText],
                    [a.specialCheck.assessEvalCheck.hasJudgement,"IS or IS NOT judgement",a.specialCheck.assessEvalCheck.judgementText],
                    [a.specialCheck.assessEvalCheck.judgementLinked,"Judgement linked to PRO/CON",null],
                  ].map(([ok,label,quote],i)=><div key={i} style={{marginBottom:"8px"}}>
                    <div style={{display:"flex",gap:"10px",alignItems:"center",fontSize:"13px",fontFamily:"sans-serif"}}><Tick ok={ok}/><span style={{color:"#e8eaf0",fontWeight:600}}>{label}</span></div>
                    {quote&&<div style={{marginLeft:"26px",color:"#ffccbc",fontSize:"15px",fontStyle:"italic",fontFamily:"sans-serif"}}>"{quote}"</div>}
                  </div>)}
                  <div style={{marginTop:"8px",color:"#ffccbc",fontSize:"13px",fontFamily:"sans-serif",lineHeight:"1.6"}}>{a.specialCheck.assessEvalCheck.comment}</div>
                </>}
              </Card>}

              {/* ── 4. Band 6 Model Answer (model sentence starter + generated) ── */}
              {a.specialCheck?.modelSentenceStarter&&<Card bg="rgba(201,168,76,0.06)" border="rgba(201,168,76,0.3)">

                {/* ── STEP 1: Structure Pattern ── */}
                <SectionTitle color={gold}>💡 HOW TO STRUCTURE YOUR ANSWER</SectionTitle>
                <div style={{fontSize:"13px",color:"#c8d8e8",fontFamily:"sans-serif",marginBottom:"10px",lineHeight:"1.5"}}>
                  This shows the <strong style={{color:"#f0d080"}}>sentence pattern</strong> a top student would use — the key words in <span style={{background:"#7b1fa2",color:"white",borderRadius:"3px",padding:"0 5px",fontSize:"11px",fontWeight:900}}>PURPLE</span> are the connectives that link your ideas. Use this as a template — replace the content with your own knowledge.
                </div>
                <div style={{background:"rgba(255,255,255,0.93)",borderRadius:"12px",padding:"14px 16px",border:"1px solid rgba(201,168,76,0.35)",marginBottom:"6px"}}>
                  <div style={{fontSize:"14px",color:"#222",fontFamily:"'Georgia',serif",lineHeight:"1.9"}}>
                    {a.specialCheck.modelSentenceStarter.split(/\b(SO|BECAUSE|BUT|IS NOT|IS)\b/).map((part,i)=>
                      ["SO","BECAUSE","BUT","IS NOT","IS"].includes(part)
                        ?<span key={i} style={{background:"#7b1fa2",color:"white",borderRadius:"4px",padding:"1px 7px",fontWeight:900,fontFamily:"sans-serif",fontSize:"12px",margin:"0 2px"}}>{part}</span>
                        :<span key={i}>{part}</span>
                    )}
                  </div>
                  <div style={{marginTop:"8px",fontSize:"11px",color:"#888",fontFamily:"sans-serif",borderTop:"1px solid #eee",paddingTop:"6px"}}>
                    ✏️ This is a <em>pattern</em>, not an answer — write your own version using your knowledge
                  </div>
                </div>

                {/* ── STEP 2: See a full example ── */}
                {!modelAnswer&&<>
                  <div style={{marginTop:"16px",marginBottom:"6px",fontSize:"13px",color:"#c8d8e8",fontFamily:"sans-serif",lineHeight:"1.5"}}>
                    Want to see a <strong style={{color:"#f0d080"}}>complete example answer</strong> written at Band 6 level? Use it to check what depth and detail is expected — not to copy.
                  </div>
                  <button onClick={generateModelAnswer} disabled={modelLoading} style={{width:"100%",padding:"12px",background:modelLoading?"#1a2a3a":`linear-gradient(90deg,${gold},#e8c96a)`,color:modelLoading?"#5a7a9a":"#040d18",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:800,cursor:modelLoading?"not-allowed":"pointer",fontFamily:"sans-serif"}}>
                    {modelLoading ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}><span className="cube-spinner"></span>Generating...</span> : "✨ Show me a Band 6 example answer"}
                  </button>
                </>}
                {modelAnswer&&<>
                  <div style={{marginTop:"14px",marginBottom:"8px",fontSize:"11px",color:"#c9a84c",fontWeight:800,letterSpacing:"1px",fontFamily:"sans-serif"}}>
                    ✨ BAND 6 EXAMPLE ANSWER
                  </div>
                  <PaperCard subtitle="">
                    <div style={{fontSize:"15px",lineHeight:"1.9",color:"#1a1a2e",fontFamily:"'Georgia',serif"}}>{modelAnswer}</div>
                  </PaperCard>
                  <div style={{fontSize:"12px",color:"#9ab",fontFamily:"sans-serif",fontStyle:"italic",marginTop:"6px"}}>This is an AI-generated example — use it to understand Band 6 depth and structure, not to copy.</div>
                </>}
              </Card>}

            </div>}
          </div>;
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
