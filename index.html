<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CUBE HSC Marking Coach — EES</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #040d18; }
    .mobile-hide { display: inline; }
    .mobile-show { display: none !important; }
    .mobile-show-inline { display: none !important; }
    .steps-hide-mobile { display: block; }
    @media (max-width: 600px) {
      .mobile-hide { display: none !important; }
      .mobile-show { display: flex !important; }
      .mobile-show-inline { display: inline !important; }
      .steps-hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
